<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdNET demo</title>
    <style>
        html, body {
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            background-color: #0f172a;
            font-size: 15px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            color: #cbd5e1;
        }
        body {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .app-container {
            width: 100%;
            max-width: 520px;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        input[type="file"] {
            color: #94a3b8;
            font-size: 0.9rem;
            flex: 1;
        }
        input[type="file"]::file-selector-button {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 12px;
            transition: background 0.2s ease;
        }
        input[type="file"]::file-selector-button:hover {
            background: #059669;
        }
        #progress_bar {
            width: 100%;
            height: 12px;
            -webkit-appearance: none;
            appearance: none;
            border: none;
            border-radius: 6px;
            overflow: hidden;
            background-color: #334155;
        }
        #progress_bar::-webkit-progress-bar { background-color: #334155; }
        #progress_bar::-webkit-progress-value { background-color: #10b981; }
        #progress_bar::-moz-progress-bar { background-color: #10b981; }
        #progress_text {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 6px;
            text-align: center;
        }
        #error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.2);
            font-size: 0.9rem;
            margin: 15px 0;
        }
        #error:empty { display: none; }
        #log {
            font-family: 'Courier New', Courier, monospace;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #38bdf8;
            border-left: 3px solid #38bdf8;
            line-height: 1.5;
            margin: 15px 0;
        }
        #log:empty { display: none; }
        #progress, #settings, #audio_file { display: none; }
        #progress { flex: 1; }
        #settings_btn {
            cursor: pointer;
            font-size: 22px;
            border: none;
            background: #334155;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
        }
        #settings_btn:hover {
            background: #475569;
            transform: rotate(30deg);
        }
        #settings {
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            border: 1px solid #334155;
            flex-direction: column;
            gap: 10px;
        }
        #select_lang {
            font-size: 1rem;
            padding: 6px 10px;
            background: #334155;
            color: white;
            border: 1px solid #475569;
            border-radius: 6px;
            width: fit-content;
            cursor: pointer;
        }
        .confidence-label {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-top: 10px;
        }
        .confidence-label span { font-weight: bold; color: #10b981; }
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: #334155;
            height: 6px;
            border-radius: 3px;
            outline: none;
            margin-top: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #10b981;
            cursor: pointer;
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        #birdslist { list-style: none; padding: 0; margin: 20px 0 0 0; }
        #birdslist li {
            background: #334155;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #10b981;
            font-size: 0.95rem;
            color: #94a3b8;
            transition: transform 0.15s ease, border-color 0.15s ease;
        }
        #birdslist li:hover {
            transform: translateX(4px);
            background: #3d4c61;
        }
        #birdslist li span { font-weight: 600; color: #f8fafc; }
        #areafilter-loader { margin-top: 15px; }
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 4px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header id="header">
        <input type="file" id="audio_file" accept="audio/*"></input>
        <div id="progress">
            <progress id="progress_bar" value="0" max="100"></progress>
            <span id="progress_text"></span>
        </div>
        <button id="settings_btn">⚙️</button>
    </header>
    <div id="settings">
        <select id="select_lang">
            <option value="en_us">🇺🇸</option>
            <option value="de">🇩🇪</option>
            <option value="es">🇪🇸</option>
            <option value="fr">🇫🇷</option>
            <option value="ja">🇯🇵</option>
            <option value="ru">🇷🇺</option>
        </select>
        <label class="confidence-label" for="audio-confidence">
            Audio detection confidence: <span id="audio-confidence-num">0.3</span>
        </label>
        <input id="audio-confidence" type="range" name="audio-confidence" value="3" min="1" max="10" />
        <label class="confidence-label" for="area-confidence">
            Area detection confidence: <span id="area-confidence-num">0</span>
        </label>
        <input id="area-confidence" type="range" name="area-confidence" value="0" min="0" max="10" />
        <span class="loader" id="areafilter-loader"></span>
    </div>

    <div id="error"></div>
    <div id="log"></div>
    <ul id="birdslist"></ul>
</div>

<script>
(async function main() {
    const version = Number(new URL(location.href).searchParams.get('ver')) || 1
    document.title = `BirdNET v${version}`
    const { BirdNetJS, SAMPLE_RATE, CHUNK_3S } = await loadingScreen({ version })
    let AUDIO_CONFIDENCE = 0.3
    let AREA_THRESHOLD = 0.1

    document.getElementById('audio_file').style.display = 'block'
    document.getElementById('audio_file').onchange = (event) => processAudio(event).catch(e => {
        document.getElementById('error').innerText = e.stack || e.message
        document.getElementById('audio_file').style.display = 'block'
        document.getElementById('progress').style.display = 'none'
    })
    async function processAudio(event) {
        const file = event.target.files[0]
        if (!file) return
        document.getElementById('error').innerHTML = ''
        document.getElementById('birdslist').innerHTML = ''
        document.getElementById('log').innerHTML = ''
        document.getElementById('audio_file').style.display = 'none'
        document.getElementById('progress').style.display = 'block'
        document.getElementById('progress_bar').value = 0
        let start = performance.now()
        const arrayBuffer = await file.arrayBuffer()
        const tempCtx = new AudioContext({ sampleRate: SAMPLE_RATE })
        const originalBuffer = await tempCtx.decodeAudioData(arrayBuffer)
        const pcmAudio = new Float32Array(originalBuffer.getChannelData(0))
        tempCtx.close()
        const audioLen = pcmAudio.length / SAMPLE_RATE
        document.getElementById('log').innerHTML = `${audioLen | 0}s audio, decoded in ${((performance.now() - start) / 1000).toFixed(1)}s. Inference...<br />`
        start = performance.now()
        for (let k = 0; k < pcmAudio.length; k += CHUNK_3S) {
            let pcm3sChunk = pcmAudio.slice(k, k + CHUNK_3S)
            if (pcm3sChunk.length < CHUNK_3S) {
                let extBuf = new Float32Array(CHUNK_3S)
                extBuf.set(pcm3sChunk, 0)
                pcm3sChunk = extBuf
            }
            const { prediction } = await BirdNetJS({ message: 'predict', pcmAudio: pcm3sChunk })
            document.getElementById('progress_bar').value = k / pcmAudio.length * 100 | 0
            const birdElems = []
            for (let j = 0; j < prediction.length; j++) {
                const audioConfidence = prediction[j].confidence
                const areaConfidence = prediction[j].geoscore
                
                const seconds = (k / SAMPLE_RATE | 0) % 60
                const minutes = k / SAMPLE_RATE / 60 | 0
                const time = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`
                const birdElem = document.createElement('li')
                const visible = areaConfidence > AUDIO_CONFIDENCE && areaConfidence > AREA_THRESHOLD
                birdElem.style.display = visible ? '' : 'none'
                birdElem.innerHTML = `${time} - <span data-geoscore="${areaConfidence}" data-confidence="${audioConfidence}">${prediction[j].nameI18n}</span> (${audioConfidence.toFixed(2)})`
                birdElems.push(birdElem)
            }
            document.getElementById('birdslist').append(...birdElems)
        }
        const timeSpent = (performance.now() - start) / 1000
        document.getElementById('progress').style.display = 'none'
        document.getElementById('audio_file').style.display = 'block'
        document.getElementById('log').innerHTML += `Inference time: ${timeSpent.toFixed(1)}s (x${audioLen / timeSpent | 0})<br />`
    }

    document.getElementById('settings').style.display = 'flex'
    let showSettigns = true
    document.getElementById('settings_btn').onclick = () => {
        document.getElementById('settings').style.display = showSettigns ? 'none' : 'flex'
        showSettigns = !showSettigns
    }
    document.getElementById('audio-confidence').onchange = async (e) => {
        AUDIO_CONFIDENCE = e.target.value / 10
        document.getElementById('audio-confidence-num').innerText = AUDIO_CONFIDENCE.toFixed(2)
        updateBirds()
    }
    document.getElementById('area-confidence').onchange = async (e) => {
        AREA_THRESHOLD = e.target.value / 10
        document.getElementById('area-confidence-num').innerText = AREA_THRESHOLD.toFixed(2)
        updateBirds()
    }
    function updateBirds() {
        document.querySelectorAll('#birdslist span').forEach(bird => {
            const confidence = Number(bird.attributes['data-confidence'].value)
            const areaScore = Number(bird.attributes['data-geoscore'].value)
            bird.parentNode.style.display = areaScore > AREA_THRESHOLD && confidence > AUDIO_CONFIDENCE ? '' : 'none'
        })
    }
})().catch(e => document.getElementById('error').innerText = e.stack || e.message)

async function loadingScreen({ version=1 }={}) {
    document.getElementById('progress').style.display = 'block'
  
    let SAMPLE_RATE = 48000
    let CHUNK_3S = 144000
    
    // Updated directly to root repo directory paths
    let path = `/birdwood-sid/birdnet.js?lang=${navigator.language}`;

    if (version === 2) {
        SAMPLE_RATE = 22050
        CHUNK_3S = 512 + 128 * 511
        path = `/birdwood-sid/birdnet2.js?lang=${navigator.language}`;
    }

    const BirdNetWorker = new Worker(path)
    async function BirdNetJS(data) {
        BirdNetWorker.postMessage(data)
        return new Promise(resolve => {
            function onMessage({ data: dataRes }) {
                if (dataRes.message === data.message) {
                    BirdNetWorker.removeEventListener('message', onMessage)
                    resolve(dataRes)
                }
            }
            BirdNetWorker.addEventListener('message', onMessage)
        })
    }

    const geolocation = new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: false })
    })
    await new Promise((resolve) => {
        function onLoadingMessage({ data }) {
            if (data.progress) {
                document.querySelector('#progress_bar').value = data.progress
            }
            if (data.message === 'load_model') {
                document.getElementById('progress_text').innerText = 'Loading BirdNET model...'
            }
            if (data.message === 'warmup') {
                document.getElementById('progress_text').innerText = 'BirdNET warmup run...'
            }
            if (data.message === 'load_labels') {
                document.getElementById('progress_text').innerText = 'Loading bird labels...'
            }
            if (data.message === 'load_geomodel') {
                document.getElementById('progress_text').innerText = 'Loading geolocation model...'
            }
            if (data.message === 'loaded') {
                BirdNetWorker.removeEventListener('message', onLoadingMessage)
                resolve()
            }
        }
        BirdNetWorker.addEventListener('message', onLoadingMessage)
    })

    document.getElementById('progress_text').innerText = 'Waiting geolocation...'
    const { coords: { latitude, longitude } } = await geolocation
    document.getElementById('progress_text').innerText = 'Inference area model...'
    await BirdNetJS({ message: 'area-scores', latitude, longitude })
    document.getElementById('progress').style.display = 'none'
    return { BirdNetJS, SAMPLE_RATE, CHUNK_3S }
}
</script>
</body>
</html>
